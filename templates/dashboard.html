<!DOCTYPE html>
<html>
<head>
    <title>Secure Notes Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
<div class="container">
    <h2>🔐 Secure Notes Vault</h2>
    
    <p>Your encrypted notes are safe and private. Only you can access them.</p>

    <h3>✏️ Add New Note</h3>
    <textarea id="note" placeholder="Write your confidential note here..."></textarea>
    <button onclick="addNote()">Save Note</button>

    <h3>📋 Your Notes</h3>
    <ul id="list"></ul>

    <button onclick="logout(event)" style="background: #6b7280; margin-top: 20px;">Logout</button>
</div>

<script src="/static/script.js"></script>
<script>
    loadNotes();
</script>
</body>
</html>
